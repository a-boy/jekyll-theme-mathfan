---
layout: default
---
<div class="page">
  <header class="page-header">
    <h1 class="page-header__title">{{ page.title | escape }}</h1>
    {% if page.date %}
      <p class="page-header__meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: site.date_format | default: "%Y-%m-%d" }}
        </time>
      </p>
    {% endif %}
  </header>

  <div class="page__content">
    {{ content }}
  </div>
</div>
